<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title> POSEIDON ATHENS HALF MARATHON </title>
    <!-- Premium Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --primary: #2563eb;
            --primary-light: #60a5fa;
            --bg: #0f172a;
            --surface: rgba(30, 41, 59, 1);
            --border: rgba(255, 255, 255, 0.1);
            --text: #f8fafc;
            --text-dim: #94a3b8;
            --success: #10b981;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Outfit', -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        header {
            padding: 2.5rem 1.5rem 1rem;
            text-align: center;
        }

        h1 {
            margin: 0;
            font-size: 1.75rem;
            font-weight: 700;
            background: linear-gradient(to right, #60a5fa, #2563eb);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.02em;
        }

        .container {
            flex: 1;
            max-width: 500px;
            margin: 0 auto;
            width: 100%;
            padding: 1rem;
        }

        #status-card {
            padding: 1.5rem;
            border-radius: 1.5rem;
            background: var(--surface);
            border: 1px solid var(--border);
            margin-bottom: 2rem;
            text-align: center;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
            transition: all 0.3s ease;
        }

        #status-card.loading {
            color: #facc15;
        }

        #status-card.success {
            color: #4ade80;
            border-color: #10b981;
            background: rgba(16, 185, 129, 0.1);
        }

        #status-text {
            font-weight: 700;
            font-size: 1.25rem;
            margin: 0;
        }

        .status-subtext {
            font-size: 0.8rem;
            text-transform: uppercase;
            color: var(--text-dim);
            display: block;
            margin-bottom: 0.5rem;
        }

        /* SAFE MODE SCANNER: No restrictive wrappers */
        #reader {
            width: 100%;
            border: 1px solid var(--border) !important;
            border-radius: 1.5rem !important;
            overflow: hidden !important;
            background: #000;
            margin-bottom: 2rem;
        }

        #reader button {
            background: var(--primary) !important;
            color: white !important;
            border: none !important;
            padding: 12px 24px !important;
            border-radius: 0.75rem !important;
            font-weight: 600 !important;
            margin: 10px !important;
            cursor: pointer !important;
        }

        #reader select {
            background: #1e293b !important;
            color: white !important;
            padding: 10px !important;
            border-radius: 0.75rem !important;
            border: 1px solid var(--border) !important;
        }

        .entry-section {
            background: var(--surface);
            border-radius: 1.5rem;
            padding: 1.5rem;
            border: 1px solid var(--border);
        }

        .entry-section h3 {
            margin: 0 0 1.25rem;
            font-size: 1rem;
            color: var(--text-dim);
            text-align: center;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        input[type="text"] {
            width: 100%;
            padding: 1.25rem;
            border-radius: 1rem;
            border: 1px solid var(--border);
            background: #0f172a;
            color: white;
            font-size: 1.1rem;
            text-align: center;
            font-family: inherit;
        }

        .btn-submit {
            padding: 1.25rem;
            border-radius: 1rem;
            border: none;
            background: var(--primary);
            color: white;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-submit:active {
            transform: scale(0.97);
        }

        .history-section {
            margin-top: 2.5rem;
        }

        .history-section h3 {
            font-size: 0.8rem;
            text-transform: uppercase;
            color: var(--text-dim);
            margin-bottom: 1rem;
            text-align: center;
        }

        .history-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .history-item {
            background: var(--surface);
            padding: 1rem;
            border-radius: 1rem;
            margin-bottom: 0.5rem;
            border: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .bib-id {
            font-weight: 700;
            color: var(--primary-light);
        }

        .time {
            font-size: 0.8rem;
            color: var(--text-dim);
        }

        .empty-history {
            text-align: center;
            color: var(--text-dim);
            font-size: 0.9rem;
            padding: 2rem;
            border: 1px dashed var(--border);
            border-radius: 1rem;
        }
    </style>
</head>

<body>
    <header>
        <h1>POSEIDON ATHENS HALF MARATHON</h1>
        <p class="subtitle">Order Check-In</p>
    </header>

    <div class="container">
        <!-- Status Dashboard -->
        <div id="status-card">
            <span class="status-subtext">Current Session Status</span>
            <p id="status-text">Ready to Scan</p>
        </div>

        <!-- Safe Scanner Container -->
        <div id="reader"></div>

        <!-- Manual Entry Dashboard -->
        <div class="entry-section">
            <h3>Manual Entry</h3>
            <div class="input-group">
                <input type="text" id="manualBib" placeholder="BIB #" autocomplete="off">
                <button class="btn-submit" onclick="submitManual()">CHECK-IN BIB</button>
            </div>
        </div>

        <!-- Recent Activity -->
        <div class="history-section">
            <h3>Recent Checks</h3>
            <div id="history-container">
                <div class="empty-history">No entries yet this session</div>
                <ul class="history-list" id="history-list"></ul>
            </div>
        </div>
    </div>

    <script>
        // Supabase Configuration
        const SUPABASE_URL = "https://viftrlmjafotgehkxsto.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZpZnRybG1qYWZvdGdlaGt4c3RvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxOTIzMjEsImV4cCI6MjA5MTc2ODMyMX0.tx7PanV9UPTN2IAmGg1QtAfvNmqRYfJOqyb09OIm3ks";
        
        const { createClient } = supabase;
        const supabaseClient = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const historyList = document.getElementById('history-list');
        const emptyHistory = document.querySelector('.empty-history');
        const statusText = document.getElementById('status-text');
        const statusCard = document.getElementById('status-card');
        const manualInput = document.getElementById('manualBib');

        let sessionHistory = [];

        // Logic from your working version
        function extractOrderId(input) {
            if (input.includes("orderid=")) {
                try {
                    let afterId = input.split("orderid=")[1];
                    return afterId.split("&")[0];
                } catch (e) {
                    return input;
                }
            }
            return input;
        }

        function addToHistory(idValue) {
            const now = new Date();
            const timeStr = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0');
            sessionHistory.unshift({ id: idValue, time: timeStr });
            if (sessionHistory.length > 5) sessionHistory.pop();
            renderHistory();
        }

        function renderHistory() {
            if (sessionHistory.length > 0 && emptyHistory) emptyHistory.style.display = 'none';
            historyList.innerHTML = sessionHistory.map(item => `
                <li class="history-item">
                    <span class="bib-id">#${item.id.substring(0, 10)}${item.id.length > 10 ? '...' : ''}</span>
                    <span class="time">${item.time}</span>
                </li>
            `).join('');
        }

        async function sendToDatabase(idValue, source = 'scan') {
            const cleanId = extractOrderId(idValue);

            // UI Feedback
            statusText.innerText = "Syncing: " + (cleanId.length > 8 ? cleanId.substring(0, 8) + "..." : cleanId);
            statusCard.className = "loading";
            manualInput.disabled = true;

            try {
                // Prepare data object based on source
                // 'scan' -> order_id column
                // 'manual' -> bib_id column
                const payload = {};
                if (source === 'scan') {
                    payload.order_id = cleanId;
                } else {
                    payload.bib_id = cleanId;
                }

                const { data, error } = await supabaseClient
                    .from('checkins')
                    .insert([payload])
                    .select();

                console.log("Supabase Response:", { data, error });

                if (error) throw error;

                if (navigator.vibrate) navigator.vibrate([100, 50, 100]);
                addToHistory(cleanId);

                statusText.innerText = "✅ RECORDED AS " + (source === 'scan' ? "ORDER" : "BIB");
                statusCard.className = "success";
                manualInput.value = "";
                manualInput.disabled = false;

                setTimeout(() => {
                    statusText.innerText = "Ready to Scan Next";
                    statusCard.className = "";
                    if (html5QrcodeScanner.getState() === 3) {
                        html5QrcodeScanner.resume();
                    }
                    manualInput.focus();
                }, 2000);

            } catch (err) {
                console.error("Database Error:", err);
                statusText.innerText = "⚠️ Sync Error: " + (err.message || "Unknown");
                statusCard.className = "";
                manualInput.disabled = false;
                
                setTimeout(() => {
                    statusText.innerText = "Ready to Scan";
                    if (html5QrcodeScanner.getState() === 3) html5QrcodeScanner.resume();
                }, 3000);
            }
        }

        function onScanSuccess(decodedText) {
            html5QrcodeScanner.pause();
            sendToDatabase(decodedText, 'scan');
        }

        function submitManual() {
            const val = manualInput.value.trim();
            if (val === "") return;
            sendToDatabase(val, 'manual');
        }

        // Initialize with your working config
        const html5QrcodeScanner = new Html5QrcodeScanner("reader", {
            fps: 15,
            qrbox: { width: 250, height: 250 },
            aspectRatio: 1.0,
            showTorchButtonIfSupported: true,
            rememberLastUsedCamera: true
        });
        html5QrcodeScanner.render(onScanSuccess);

        // Auto focus manual input
        window.addEventListener('load', () => manualInput.focus());

    </script>
</body>

</html>
